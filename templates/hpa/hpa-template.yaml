{{- if .Values.hpa.enabled }}
  {{- range $hpa_key, $hpa_val := .Values.hpa.services }}
    {{- if kindIs "map" $hpa_val }}
      {{- $keda := $hpa_val.keda | default (dict) }}
      {{- if and ($hpa_val.enabled) ($keda.enabled) (not $.Values.hpa.keda.enabled) }}
      {{- fail (printf "hpa.services.%s.keda.enabled=true requires hpa.keda.enabled=true (KEDA subchart)" $hpa_key) }}
      {{- end }}
      {{- /* Native HPA — rendered unless KEDA manages this service. */}}
      {{- if and ($hpa_val.enabled) (not $keda.enabled) }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $hpa_val.name | quote }}
  namespace: {{ $.Release.Namespace | quote }}
spec:
  scaleTargetRef:
    apiVersion: {{ $hpa_val.scaleTargetRef.apiVersion }}
    {{- if and (eq $hpa_val.name "feature-server") (not $.Values.featureServer.useStatefulSet) }}
    ## feature-server workload kind follows featureServer.useStatefulSet
    kind: Deployment
    {{- else }}
    kind: {{ $hpa_val.scaleTargetRef.kind }}
    {{- end }}
    name: {{ $hpa_val.name | quote }}
  minReplicas: {{ $hpa_val.minReplicas }}
  maxReplicas: {{ $hpa_val.maxReplicas }}
  metrics:
    {{- include "vg.common.tplvalues.render" ( dict "value" $hpa_val.metrics "context" $ ) | nindent 4 }}
  {{- if $hpa_val.behavior }}
  behavior:
    {{- include "vg.common.tplvalues.render" ( dict "value" $hpa_val.behavior "context" $ ) | nindent 4 }}
  {{- end }}
      {{- end }}
      {{- /* KEDA-managed autoscaling — mirrors the Cognigy.AI chart convention.
             KEDA creates and owns the HPA; triggers query their sources directly
             (Prometheus, Redis streams, …). Requires hpa.keda.enabled=true (subchart). */}}
      {{- if and ($hpa_val.enabled) ($keda.enabled) }}
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ $hpa_val.name | quote }}
  namespace: {{ $.Release.Namespace | quote }}
  annotations:
    ## adopt an existing same-name HPA on migration instead of erroring
    scaledobject.keda.sh/transfer-hpa-ownership: "true"
spec:
  scaleTargetRef:
    apiVersion: {{ $hpa_val.scaleTargetRef.apiVersion }}
    {{- if and (eq $hpa_val.name "feature-server") (not $.Values.featureServer.useStatefulSet) }}
    ## feature-server workload kind follows featureServer.useStatefulSet
    kind: Deployment
    {{- else }}
    kind: {{ $hpa_val.scaleTargetRef.kind }}
    {{- end }}
    name: {{ $hpa_val.name | quote }}
  {{- if $keda.pollingInterval }}
  pollingInterval: {{ $keda.pollingInterval }}
  {{- end }}
  {{- if $keda.cooldownPeriod }}
  cooldownPeriod: {{ $keda.cooldownPeriod }}
  {{- end }}
  minReplicaCount: {{ $hpa_val.minReplicas }}
  maxReplicaCount: {{ $hpa_val.maxReplicas }}
  triggers:
    {{- include "vg.common.tplvalues.render" ( dict "value" $keda.triggers "context" $ ) | nindent 4 }}
  advanced:
    horizontalPodAutoscalerConfig:
      name: {{ $hpa_val.name | quote }}
      {{- if $hpa_val.behavior }}
      behavior:
        {{- include "vg.common.tplvalues.render" ( dict "value" $hpa_val.behavior "context" $ ) | nindent 8 }}
      {{- end }}
      {{- end }}
    {{- end }}
  {{- end }}
{{- end }}
