{{- if and .Values.vgConnector.enabled .Values.ingress.enabled .Values.traefik.enabled }}
{{- $host := .Values.ingress.vgConnector.host }}
{{- $entry := ternary "websecure" "web" .Values.tls.enabled }}
{{- $whitelist := .Values.ingress.vgConnector.ipWhiteListMiddleware.enabled }}
{{- $tlsSecret := "" }}
{{- if .Values.tls.enabled }}
  {{- if .Values.tls.existingSecret }}
    {{- $tlsSecret = .Values.tls.existingSecret }}
  {{- else if and .Values.tls.crt .Values.tls.key }}
    {{- $tlsSecret = "cognigy-traefik" }}
  {{- end }}
{{- end }}

{{/* Default catchall route */}}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: vg-connector-default
  namespace: {{ $.Release.Namespace | quote }}
  labels:
    app: vg-connector
spec:
  entryPoints:
    - {{ $entry }}
  routes:
    # No priority: rule-length ordering lets the per-pod podIndex routes outrank this catchall.
    - match: Host(`{{ $host }}`)
      kind: Rule
      services:
        - name: vg-connector
          kind: Service
          port: {{ $.Values.vgConnector.port }}
      {{- if $whitelist }}
      middlewares:
        - name: ipwhitelistvgconnector
      {{- end }}
  {{- if and .Values.tls.enabled $tlsSecret }}
  tls:
    secretName: {{ $tlsSecret }}
  {{- end }}

{{/* Pod-specific routes */}}
{{- range $i := until (int .Values.vgConnector.replicaCount) }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: vg-connector-pod-{{ $i }}
  namespace: {{ $.Release.Namespace | quote }}
  labels:
    app: vg-connector
    pod-index: "{{ $i }}"
spec:
  entryPoints:
    - {{ $entry }}
  routes:
    - match: Host(`{{ $host }}`) && Query(`podIndex`, `{{ $i }}`)
      kind: Rule
      priority: 100
      services:
        - name: vg-connector-pod-{{ $i }}
          kind: Service
          port: {{ $.Values.vgConnector.port }}
      {{- if $whitelist }}
      middlewares:
        - name: ipwhitelistvgconnector
      {{- end }}
  {{- if and $.Values.tls.enabled $tlsSecret }}
  tls:
    secretName: {{ $tlsSecret }}
  {{- end }}
{{- end }}
{{- end }}
