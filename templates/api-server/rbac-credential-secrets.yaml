---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vg-api-credential-secrets
  namespace: {{ $.Release.Namespace | quote }}
rules:
  # create: resourceNames cannot restrict create (URL has no resource name); allow create for our secrets
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  # get/update/patch: restrict to our credential secrets
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: [
      "vg-api-admin-creds",
      "vg-api-cognigy-ai-creds",
      "vg-default-interaction-panel-service-provider"
    ]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vg-api-credential-secrets
  namespace: {{ $.Release.Namespace | quote }}
subjects:
  - kind: ServiceAccount
    name: default
    namespace: {{ $.Release.Namespace | quote }}
roleRef:
  kind: Role
  name: vg-api-credential-secrets
  apiGroup: rbac.authorization.k8s.io