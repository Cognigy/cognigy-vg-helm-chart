{{- if eq .Values.cloud "stackit" -}}
kind: StorageClass
apiVersion: storage.k8s.io/v1
metadata:
  name: {{ .Values.stackit.mysql.storageClassName | quote }}
provisioner: {{ .Values.stackit.mysql.provisionerName | quote }}
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
parameters:
  type: {{ .Values.stackit.mysql.pdType | quote }}
{{- end -}}
