{{- if and .Values.sileroVad.enabled .Values.sileroVad.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: silero-vad
  namespace: {{ $.Release.Namespace | quote }}
  labels:
    app: silero-vad
    owner-team: echo
spec:
  podSelector:
    matchLabels:
      app: silero-vad
  policyTypes:
    - Ingress
  ingress:
    - from:
{{ toYaml .Values.sileroVad.networkPolicy.ingressFrom | indent 8 }}
      ports:
        - protocol: TCP
          port: {{ .Values.sileroVad.port }}
    {{- if .Values.sileroVad.networkPolicy.allowMonitoringScrape }}
    - from:
        - namespaceSelector:
{{ toYaml .Values.sileroVad.networkPolicy.monitoringNamespaceSelector | indent 12 }}
      ports:
        - protocol: TCP
          port: {{ .Values.sileroVad.port }}
    {{- end }}
{{- end }}
