{{- /* Deploy the daily-billing-reporting-v1 CronJob when billing and sendToCentral are enabled */ -}}
{{ if and .Values.billing.enabled .Values.billing.sendToCentral.enabled .Values.billing.sendToCentral.serverUrl }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: vg-daily-billing-reporting
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app: vg-billing
    component: daily-billing-reporting
    owner-team: echo
  annotations:
    "cognigy.com/source-code": "git@github.com:Cognigy/vg-api-server.git"
spec:
  schedule: {{ .Values.billing.sendToCentral.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app: vg-billing
            component: daily-billing-reporting
          annotations:
            sidecar.istio.io/inject: "false"
        spec:
          {{- include "image.pullSecrets" $ | nindent 10 }}
          restartPolicy: Never
          containers:
            - name: daily-billing-reporting
              image: {{ include "vg.common.image.render" (dict "global" $.Values.global "image" .Values.api.image) }}
              imagePullPolicy: {{ .Values.api.imagePullPolicy | default "IfNotPresent" }}
              command: ["node", "build/lib/billing/jobs/daily-billing-reporting-v1/index.js"]
              env:
                - name: JAMBONES_MYSQL_HOST
                  value: {{ .Values.mysql.host | quote }}
                - name: JAMBONES_MYSQL_PORT
                  value: {{ .Values.mysql.port | default "3306" | quote }}
                - name: JAMBONES_MYSQL_DATABASE
                  value: {{ .Values.mysql.database.name | quote }}
                - name: JAMBONES_MYSQL_USER
                  value: {{ .Values.billing.mysql.username | quote }}
                - name: JAMBONES_MYSQL_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.billing.mysql.existingSecret | quote }}
                      key: {{ .Values.billing.mysql.secretKey | quote }}
                - name: VG_SPEECH_BILLING_MYSQL_HOST
                  value: {{ .Values.mysql.host | quote }}
                - name: VG_SPEECH_BILLING_MYSQL_PORT
                  value: {{ .Values.mysql.port | default "3306" | quote }}
                - name: VG_SPEECH_BILLING_MYSQL_DATABASE
                  value: {{ .Values.billing.mysql.database | quote }}
                - name: VG_SPEECH_BILLING_MYSQL_USER
                  value: {{ .Values.billing.mysql.username | quote }}
                - name: VG_SPEECH_BILLING_MYSQL_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.billing.mysql.existingSecret | quote }}
                      key: {{ .Values.billing.mysql.secretKey | quote }}
                - name: VG_SPEECH_BILLING_SERVER_URL
                  value: {{ .Values.billing.sendToCentral.serverUrl | quote }}
                - name: BILLING_VG_PRIVATE_KEY_PATH
                  value: {{ .Values.billing.sendToCentral.privateKeyPath | default "" | quote }}
                - name: VG_SPEECH_BILLING_REPORTING_LAG_DAYS
                  value: {{ .Values.billing.sendToCentral.reportingLagDays | quote }}
                - name: COGNIGY_AI_VERSION
                  value: {{ regexFind "^[0-9]+\\.[0-9]+\\.[0-9]+" .Chart.Version | quote }}
                - name: JAMBONES_LOGLEVEL
                  value: {{ if .Values.billing.logLevel }}{{ .Values.billing.logLevel | quote }}{{ else }}{{ .Values.global.logLevel | quote }}{{ end }}
              resources:
                requests:
                  cpu: "100m"
                  memory: "256Mi"
                limits:
                  cpu: "500m"
                  memory: "512Mi"
{{- end }}
