{{- if and .Values.vgTestHarness.deepgramBridge.enabled (not .Values.vgTestHarness.deepgramBridge.existingSecret) }}
# Chart-managed Secret holding the Deepgram API key. Skipped when
# existingSecret is set, in which case deepgram-bridge reads the key from the
# Secret you manage instead.
apiVersion: v1
kind: Secret
metadata:
  name: deepgram-bridge
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app: deepgram-bridge
    owner-team: echo
type: Opaque
stringData:
  apiKey: {{ required "vgTestHarness.deepgramBridge.deepgramApiKey is required when deepgramBridge is enabled and existingSecret is unset" .Values.vgTestHarness.deepgramBridge.deepgramApiKey | quote }}
{{- end }}
