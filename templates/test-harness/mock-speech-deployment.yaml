{{- if .Values.vgTestHarness.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-speech
  namespace: {{ .Release.Namespace | quote }}
  annotations:
    "cognigy.com/source-code": "git@github.com:Cognigy/vg-test-harness.git"
  labels:
    app: mock-speech
    owner-team: echo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-speech
  template:
    metadata:
      labels:
        app: mock-speech
    spec:
      {{- include "image.pullSecrets" $ | nindent 6 }}
      containers:
        - name: mock-speech
          image: {{ .Values.vgTestHarness.mockSpeech.image }}
          imagePullPolicy: Always
          args:
            - --http-addr=:8080
            - "--transcript={{ .Values.vgTestHarness.mockSpeech.defaultTranscript | default "mock transcript" }}"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources: {{- toYaml .Values.vgTestHarness.mockSpeech.resources | nindent 12 }}
{{- end }}
