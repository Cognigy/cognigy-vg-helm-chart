{{- if not (lookup "v1" "Secret" $.Release.Namespace "vg-billing-mysql-password") }}
---
apiVersion: v1
kind: Secret
metadata:
  name: vg-billing-mysql-password
  namespace: {{ $.Release.Namespace | quote }}
  annotations:
    "helm.sh/resource-policy": "keep"
    {{- if .Values.apiMigrator.hookEnabled }}
    "helm.sh/hook": "pre-install,pre-upgrade"
    "helm.sh/hook-weight": "-2"
    {{- end }}
type: Opaque
data:
  # use 32 bytes of random value, hex
  billing-password: "{{ printf "%x" (randAlphaNum 32) | b64enc }}"
{{- end }}
