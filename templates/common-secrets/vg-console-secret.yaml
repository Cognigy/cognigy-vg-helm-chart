{{- if .Values.vgConsole.enabled }}
{{- if not (lookup "v1" "Secret" $.Release.Namespace (.Values.vgConsole.ciApiToken.secretName | default "vg-console-secret")) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.vgConsole.ciApiToken.secretName | default "vg-console-secret" }}
  namespace: {{ $.Release.Namespace | quote }}
  annotations:
    "helm.sh/resource-policy": "keep"
    {{- if .Values.apiMigrator.hookEnabled }}
    "helm.sh/hook": "pre-install,pre-upgrade"
    "helm.sh/hook-weight": "-2"
    {{- end }}
type: Opaque
data:
  # CI service token the release pipelines use to authenticate changelog publish
  # calls. Generated once and kept (resource-policy: keep); read it from the
  # cluster and store it as the VG_CONSOLE_API_TOKEN GitHub secret in the
  # release repos so CI sends a matching Bearer token.
  {{ .Values.vgConsole.ciApiToken.secretKey | default "VG_CONSOLE_API_TOKEN" }}: "{{ printf "%x" (randAlphaNum 32) | b64enc }}"
{{- end }}
{{- end }}
