{{- /*
  Unified feature-server workload. Renders a StatefulSet when
  featureServer.useStatefulSet is true (default), otherwise a Deployment.
  The pod spec is identical in both modes; only kind + serviceName differ.
  A Deployment relies on the headless service (see service.yaml) for real
  per-pod DNS/SIP routing, so it works on AWS and Azure alike.
*/ -}}
apiVersion: apps/v1
kind: {{ if .Values.featureServer.useStatefulSet }}StatefulSet{{ else }}Deployment{{ end }}
metadata:
  name: feature-server
  namespace: {{ $.Release.Namespace | quote }}
  labels:
    owner-team: echo
  annotations:
    "cognigy.com/source-code": "git@github.com:Cognigy/vg-feature-server.git"
    "cognigy.com/source-code.db-create-wait": "empty"
    "cognigy.com/source-code.drachtio": "git@github.com:Cognigy/vg-drachtio.git"
    "cognigy.com/source-code.freeswitch": "git@github.com:Cognigy/vg-freeswitch-mrf.git"
    "cognigy.com/source-code.feature-server": "git@github.com:Cognigy/vg-feature-server.git"
spec:
  selector:
    matchLabels:
      app: feature-server
  {{- if not (and ($.Values.hpa.enabled) ($.Values.hpa.removeReplicas) ($.Values.hpa.services.featureServer.enabled)) }}
  replicas: {{ .Values.featureServer.replicaCount }}
  {{- end }}
  {{- if .Values.featureServer.useStatefulSet }}
  serviceName: {{ .Values.featureServer.headlessServiceName }}
  {{- end }}
  template:
    metadata:
      labels:
        app: feature-server
      annotations:
        checksum/cognigy-env: {{ include (print $.Template.BasePath "/configurations/cognigy-env.yaml") $ | sha256sum }}
    spec:
      {{- include "image.pullSecrets" $ | nindent 6 }}
      {{- if .Values.featureServer.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ .Values.featureServer.terminationGracePeriodSeconds }}
      {{- end }}
      {{- if .Values.featureServer.affinity }}
      affinity: {{- include "vg.common.tplvalues.render" (dict "value" .Values.featureServer.affinity "context" $) | nindent 8 }}
      {{- end }}
      {{- if or (.Values.featureServer.nodeSelector) (and ($.Values.hpa.enabled) ($.Values.hpa.useHpaNodeSelector) ($.Values.hpa.services.featureServer.enabled))}}
      nodeSelector:
        {{- if .Values.featureServer.nodeSelector }}
          {{- include "vg.common.tplvalues.render" (dict "value" .Values.featureServer.nodeSelector "context" $) | nindent 8 }}
        {{- end }}
        {{- if and ($.Values.hpa.enabled) ($.Values.hpa.useHpaNodeSelector) ($.Values.hpa.services.featureServer.enabled) }}
          {{- include "vg.common.tplvalues.render" (dict "value" $.Values.hpa.hpaNodeSelector "context" $) | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- if .Values.featureServer.priorityClassName }}
      priorityClassName: {{ .Values.featureServer.priorityClassName }}
      {{- end }}
      {{- if .Values.featureServer.podSecurityContext }}
      securityContext: {{- include "vg.common.tplvalues.render" (dict "value" .Values.featureServer.podSecurityContext "context" $) | nindent 8 }}
      {{- end }}
      {{- if or (.Values.featureServer.tolerations) (and ($.Values.hpa.enabled) ($.Values.hpa.useHpaTolerations) ($.Values.hpa.services.featureServer.enabled))}}
      tolerations:
        {{- if or (.Values.featureServer.tolerations) }}
          {{- include "vg.common.tplvalues.render" (dict "value" .Values.featureServer.tolerations "context" $) | nindent 8 }}
        {{- end }}
        {{- if and ($.Values.hpa.enabled) ($.Values.hpa.useHpaTolerations) ($.Values.hpa.services.featureServer.enabled) }}
          {{- include "vg.common.tplvalues.render" (dict "value" $.Values.hpa.hpaTolerations "context" $) | nindent 8 }}
        {{- end }}
      {{- end }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: feature-server
      restartPolicy: Always
      initContainers:
        - image: kanisterio/mysql-sidecar:0.40.0
          name: db-create-wait
          env:
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: voicegateway-mysql-password
                  key: mysql-password
          command:
            - sh 
            - -c 
            - |
              until mysql -u {{ .Values.mysql.auth.username }} -D {{ .Values.mysql.database.name }} -h {{ .Values.mysql.host }} -p${PASSWORD} --protocol=tcp -e "select count(*) from accounts";
              do 
                sleep 5
              done
      containers:
        - name: drachtio
          image: {{ include "vg.common.image.render" (dict "global" $.Values.global "image" .Values.drachtio.image) }}
          imagePullPolicy: {{ .Values.drachtio.imagePullPolicy }}
          resources: {{- toYaml .Values.drachtio.resources | nindent 12 }}
          ports:
            - name: drachtio
              containerPort: {{ .Values.drachtio.port }}
              protocol: TCP
            - name: fs-drachtio
              containerPort: {{ .Values.drachtio.metricsPort }}
              protocol: TCP
          env: 
            - name: CLOUD 
              value: {{ .Values.cloud | quote }}
            {{- if eq .Values.cloud "aws" }}
            - name: IMDSv2
              value: {{ .Values.aws.useIMDSv2 | quote }}
            {{- end }}
            {{- if and (eq .Values.cloud "azure") (.Values.azure.useLoadBalancerIMDS) }}
            - name: LB_IMDS
              value: {{ .Values.azure.useLoadBalancerIMDS | quote }}
            {{- end }}
            - name: DRACHTIO_SECRET
              valueFrom:
                secretKeyRef:
                  name: voicegateway-drachtio-secret
                  key: secret
            - name: SOFIA_SEARCH_DOMAINS
              value: "1"
            - name: SOFIA_SRES_NO_CACHE
              value: "1"
            - name: DRACHTIO_SUPPORT_BEST_EFFORT_TLS
              value: {{ if .Values.drachtio.supportBestEffortTls }}{{ print 1 | quote }}{{ else }}{{ print 0 | quote }}{{ end }}
            - name: PRIVATE_IP_ONLY
              value: {{ .Values.drachtio.privateIpOnly | quote }}
            {{- if .Values.drachtio.extraEnvVars }}
            {{- include "vg.common.tplvalues.render" (dict "value" .Values.drachtio.extraEnvVars "context" $) | nindent 12 }}
            {{- end }}
          lifecycle:
            preStop:
              # 200 = feature-server drained, 000 = feature-server gone (fail open),
              # 503 = calls still active (keep waiting). Anything else (e.g. 404 from a
              # feature-server image without the route) fails open after 6 consecutive
              # hits instead of hanging until terminationGracePeriodSeconds.
              exec:
                command: [
                  "/bin/sh",
                  "-c",
                  "misses=0; while true; do code=$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 2 --max-time 4 http://127.0.0.1:${HEALTH_CHECK_PORT:-8001}/health/ready-to-shutdown 2>/dev/null); case \"$code\" in 200|000) exit 0;; 503) misses=0;; *) misses=$((misses+1)); if [ \"$misses\" -ge 6 ]; then exit 0; fi;; esac; sleep 5; done"
                ]
          {{- if .Values.sbcInbound.featureServerSignalingTransportTcp }}
          args:
            - drachtio
            - --contact
            - 'sip:*:5060;transport=udp,tcp'
            - --loglevel
            - {{ if .Values.drachtio.logLevel }}{{ .Values.drachtio.logLevel | quote }}{{ else }}{{ .Values.global.logLevel | quote }}{{ end }}
            - --sofia-loglevel
            - {{ .Values.featureServer.sofiaLoglevel | quote }}
            - --prometheus-scrape-port
            - {{ .Values.drachtio.metricsPort | quote }}
          {{- else }}
          args: 
            - drachtio
            - --contact
            - 'sip:*:5060;transport=udp'
            - --mtu ## max packet size for UDP
            - '4096'
            - --loglevel
            - {{ if .Values.drachtio.logLevel }}{{ .Values.drachtio.logLevel | quote }}{{ else }}{{ .Values.global.logLevel | quote }}{{ end }}
            - --sofia-loglevel
            - {{ .Values.featureServer.sofiaLoglevel | quote }}
            - --prometheus-scrape-port
            - {{ .Values.drachtio.metricsPort | quote }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: cognigy-env
        - name: freeswitch
          image: {{ include "vg.common.image.render" (dict "global" $.Values.global "image" .Values.freeswitch.image) }}
          tty: true
          imagePullPolicy: {{ .Values.freeswitch.imagePullPolicy }}
          resources: {{- toYaml .Values.freeswitch.resources | nindent 12 }}
          ports:
            - name: freeswitch
              containerPort: {{ .Values.freeswitch.ports.eventSocket }}
              protocol: TCP
            - name: fs-freeswitch
              containerPort: {{ .Values.freeswitch.metricsPort }}
              protocol: TCP
          args:
            - freeswitch
            - --username
            - {{ .Values.freeswitch.username | quote }}            
            - --sip-port
            - {{ .Values.freeswitch.ports.sip | quote }}
            - --tls-port
            - {{ .Values.freeswitch.ports.tls | quote }}
            - --event-socket-port
            - {{ .Values.freeswitch.ports.eventSocket | quote }}
            {{- if .Values.freeswitch.createCoreFile }}
            - --create-core-file
            {{- end }}
            {{- range .Values.freeswitch.args }}
            - {{ . }}
            {{- end }}
          env: 
            - name: MOD_AUDIO_FORK_SUBPROTOCOL_NAME
              value: audio.jambonz.org
            - name: MOD_AUDIO_FORK_SERVICE_THREADS
              value: {{ .Values.freeswitch.serviceThreads | quote }}
            - name: MOD_AUDIO_FORK_BUFFER_SECS
              value: {{ .Values.freeswitch.bufferSecs | quote }}
            - name: JAMBONZ_TMP_CACHE_FOLDER
              value: {{ .Values.freeswitch.tmpCacheAudioFolder | quote }}
            - name: DEEPGRAM_SPEECH_USE_SINGLE_CONNECTION
              value: {{ if .Values.freeswitch.deepgramSttUseSingleConnection }}{{ print 1 | quote }}{{ else }}{{ print 0 | quote }}{{ end }}
            - name: AZURE_SPEECH_USE_SINGLE_CONNECTION
              value: {{ if .Values.freeswitch.azureSttUseSingleConnection }}{{ print 1 | quote }}{{ else }}{{ print 0 | quote }}{{ end }}
            - name: DISABLE_HTTP2_FOR_TTS_STREAMING
              value: {{ if .Values.freeswitch.disableHttp2ForTtsStreaming }}{{ print 1 | quote }}{{ else }}{{ print 0 | quote }}{{ end }}
            {{- include "vg.testHarness.freeswitchEnv" . | nindent 12 }}
            {{- if .Values.freeswitch.extraEnvVars }}
            {{- include "vg.common.tplvalues.render" (dict "value" .Values.freeswitch.extraEnvVars "context" $) | nindent 12 }}
            {{- end }}
          {{- if .Values.freeswitch.livenessProbe.enabled }}
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - fs_cli -p JambonzR0ck$ -P {{ .Values.freeswitch.ports.eventSocket }} -x 'status'
            periodSeconds: {{ .Values.freeswitch.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.freeswitch.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.freeswitch.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.freeswitch.startupProbe.enabled }}
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - fs_cli -p JambonzR0ck$ -P {{ .Values.freeswitch.ports.eventSocket }} -x 'status'
            periodSeconds: {{ .Values.freeswitch.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.freeswitch.startupProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.freeswitch.startupProbe.failureThreshold }}
          {{- end }}
          lifecycle:
            preStop:
              exec:
                command: ["/bin/bash", "/usr/local/freeswitch/cognigy/k8s-pre-stop-hook.sh"]
          volumeMounts:
            - mountPath: /tmp
              name: temp-audio-volume
            - mountPath: /coredumps
              name: fs-core-dumps
          envFrom:
            - configMapRef:
                name: cognigy-env
        - name: feature-server
          image: {{ include "vg.common.image.render" (dict "global" $.Values.global "image" .Values.featureServer.image) }}
          imagePullPolicy: {{ .Values.featureServer.imagePullPolicy }}
          resources: {{- toYaml .Values.featureServer.resources | nindent 12 }}
          ports:
            - name: feature-server
              containerPort: {{ .Values.featureServer.ports.tcp }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            - name: health
              containerPort: {{ .Values.health.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health/liveness
              port: {{ .Values.health.port }}
            failureThreshold: 3
            initialDelaySeconds: 90
            periodSeconds: 60
            timeoutSeconds: 10 
          startupProbe:
            httpGet:
              path: /health/startup
              port: {{ .Values.health.port }}
          volumeMounts:
            - mountPath: /tmp 
              name: temp-audio-volume
          env:
            - name: NODE_ENV
              value: {{ .Values.global.nodeEnv | quote }}
            - name: HTTP_PORT
              value: {{ .Values.featureServer.ports.tcp | quote }}
            - name: K8S 
              value: {{ .Values.global.k8s | quote }}
            - name: K8S_SBC_SIP_SERVICE_NAME 
              value: {{ .Values.sbc.sip.headlessServiceName }}
            - name: SYSTEM_SPEECH_CREDENTIAL_LABEL
              value: {{ $.Values.sharedSpeechCredentials.label | quote }}
            - name: FEATURE_ENABLE_SHARED_SPEECH_CREDENTIALS
              value: {{ $.Values.sharedSpeechCredentials.enabled | quote }}
            - name: ENABLE_CLUSTER_WIDE_SHARED_CREDENTIALS
              value: {{ $.Values.sharedSpeechCredentials.clusterWide | quote }}
            - name: SHARED_SPEECH_CREDENTIALS_MICROSOFT_HD_VOICES_ENABLED
              value: {{ $.Values.sharedSpeechCredentials.microsoftHdVoiceEnabled | quote }}
            - name: JAMBONZ_GATHER_EARLY_HINTS_MATCH
              value: "true"
            - name: JAMBONES_INJECT_CONTENT
              value: "true"
            - name: JAMBONZ_CLEANUP_INTERVAL_MINS
              value: "60"
            - name: SIP_HEADER_COGNIGY_CONTACT_DATA
              value: {{ .Values.nice.sipHeaderCognigyContactData | quote }}
            - name: JAMBONES_API_BASE_URL
              value: {{ .Values.ingress.api.host }}/v1
            - name: JAMBONZ_RECORD_WS_BASE_URL
              value: {{ printf "\"ws://%s:%s/v1\"" .Values.api.serviceName (toString (int .Values.api.port)) }}
            - name: JAMBONZ_RECORD_WS_USERNAME
              valueFrom:
                secretKeyRef:
                  name: voicegateway-call-recording-credentials
                  key: username
            - name: JAMBONZ_RECORD_WS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: voicegateway-call-recording-credentials
                  key: password
            - name: JAMBONES_FREESWITCH
              value: {{ .Values.featureServer.freeswitchConnection | quote }}
            - name: ENABLE_METRICS
              value: {{ if .Values.stats.enabled }}{{ print 1 | quote }}{{ else }}{{ print 0 | quote }}{{ end }}
            - name: K8S_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: STATS_TAGS
              value: "pod:$(K8S_POD_NAME)"
            - name: STATS_PROTOCOL
              value: {{ .Values.stats.protocol }}
            - name: STATS_TELEGRAF
              value: {{ if .Values.stats.telegraf }}{{ print 1 | quote }}{{ else }}{{ print 0 | quote }}{{ end }}
            - name: STATS_HOST
              value: {{ .Values.telegraf.serviceName }}
            - name: STATS_PORT
              value: {{ .Values.telegraf.port  | quote }}
            - name: STATS_SAMPLE_RATE
              value:  {{ .Values.stats.sampleRate | quote }}
            - name: DRACHTIO_HOST
              value: {{ .Values.global.localhost }}
            - name: DRACHTIO_PORT 
              value: {{ .Values.drachtio.port | quote }}
            - name: DRACHTIO_SECRET
              valueFrom:
                secretKeyRef:
                  name: voicegateway-drachtio-secret
                  key: secret
            - name: LOG_LEVEL
              value: {{ if .Values.featureServer.logLevel }}{{ .Values.featureServer.logLevel | quote }}{{ else }}{{ .Values.global.logLevel | quote }}{{ end }}
            - name: JAMBONES_LOGLEVEL
              value: {{ if .Values.featureServer.logLevel }}{{ .Values.featureServer.logLevel | quote }}{{ else }}{{ .Values.global.logLevel | quote }}{{ end }}
            - name: JAMBONES_MYSQL_HOST
              value: {{ .Values.mysql.host }}
            - name: JAMBONES_MYSQL_DATABASE
              value: {{ .Values.mysql.database.name | quote }}
            - name: JAMBONES_MYSQL_USER
              value: {{ .Values.mysql.auth.username | quote }}
            - name: JAMBONES_MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: voicegateway-mysql-password
                  key: mysql-password
            - name: JAMBONES_REDIS_HOST
              value: {{ .Values.redis.host }}
            - name: JAMBONES_REDIS_PORT
              value: {{ .Values.redis.port | quote }}
            - name: JAMBONES_TIME_SERIES_HOST
              value: {{ .Values.influxdb.host }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: voicegateway-jwt
                  key: jwt
            - name: VMD_HINTS_FILE
              value: |
                {{ .Values.phraseList | trim | nindent 16 }}
            - name: JAMBONES_OTEL_ENABLED
              value: {{ default "true" .Values.featureServer.otelEnabled | quote }}
            - name: VG_TTS_TRIM_SILENCE
              value: {{ .Values.featureServer.trimTts | quote }}
            {{- $tracing := .Values.otelCollector.tracing | default dict }}
            {{- $jaegerHost := "" }}
            {{- if $tracing.enabled }}
            {{- $jaegerHost = $tracing.otelExporterJaegerAgentHost }}
            {{- else }}
            {{- $jaegerHost = "jaeger" }}
            {{- end }}
            - name: OTEL_EXPORTER_JAEGER_AGENT_HOST
              value: {{ $jaegerHost | quote }}
            {{- if $tracing.otelExporterJaegerEndpoint }}
            - name: OTEL_EXPORTER_JAEGER_ENDPOINT
              value: {{ $tracing.otelExporterJaegerEndpoint | quote }}
            {{- end }}
            {{- if $tracing.otelExporterCollectorUrl }}
            - name: OTEL_EXPORTER_COLLECTOR_URL
              value: {{ $tracing.otelExporterCollectorUrl | quote }}
            {{- end }}
            - name: OTEL_TRACES_SAMPLER
              value: {{ default "parentbased_traceidratio" $tracing.otelTracesSampler | quote }}
            - name: OTEL_TRACES_SAMPLER_ARG
              value: {{ default "1.0" $tracing.otelSampleRate | quote }}
            - name: TRACING_ENABLED
              value: {{ .Values.tracing.enabled | quote }}
            - name: TRACING_BASE_URL_WITH_PROTOCOL
              value: {{ .Values.tracing.baseUrl | quote }}      
            - name: TRACING_ERRORS_ENABLED
              value: {{ .Values.tracing.errorsEnabled | quote }}
            - name: TRACING_SAMPLE_RATE
              value: {{ .Values.tracing.sampleRate | quote }}
            - name: TRACING_EVENTS_SAMPLE_RATE
              value: {{ .Values.tracing.eventsSampleRate | quote }}
            - name: ENVIRONMENT
              value: {{ .Values.tracing.environment | quote }}
            - name: COGNIGY_AI_VERSION
              value: {{ regexFind "^[0-9]+\\.[0-9]+\\.[0-9]+" .Chart.Version | quote }}
            - name: SIGTERM_FORCE_CLOSE_TIMEOUT
              value: {{ .Values.featureServer.sigtermForceCloseTimeoutMs | quote }}
            - name: NODE_OPTIONS
              value: {{ .Values.featureServer.nodeOptions | quote }}
            - name: VG_EAGERLY_PRE_CACHE_AUDIO
              value: {{ .Values.featureServer.preCacheAudio | quote }}
            - name: JAMBONES_DISABLE_TTS_STREAMING
              {{- if kindIs "bool" .Values.featureServer.enableTtsStreaming }}
              value: {{ not .Values.featureServer.enableTtsStreaming | quote }}
              {{- else }}
              value: {{ not .Values.global.enableTtsStreaming | quote }}
              {{- end }}
            - name: FEATURE_TTS_STREAMING_VENDORS
              value: {{ .Values.featureServer.streamingTtsVendors | join "," | quote }}
            - name: ANCHOR_MEDIA_ALWAYS
              value: {{ .Values.featureServer.anchorMediaAlways | quote }}
            - name: VG_DISABLE_DIAL_PAI_HEADER
              value: {{ .Values.featureServer.disableDialPaiHeader | quote }}
            - name: PRE_CACHE_IGNORE_LIST
              value: {{ .Values.featureServer.preCacheIgnoreList | quote }}
            - name: MEDIA_PROCESSOR_ENABLED
              value: {{ and .Values.mediaProcessor.enabled .Values.featureServer.mediaProcessor.enabled | quote }}
            {{- if and (.Values.mediaProcessor.enabled) (.Values.featureServer.mediaProcessor.enabled) }}
            - name: MEDIA_PROCESSOR_ADDRESS
              value: {{ printf "%s:%d" .Values.mediaProcessor.serviceName (int .Values.mediaProcessor.ports.grpc) | quote }}
            - name: MEDIA_PROCESSOR_STT_VENDORS
              value: {{ .Values.featureServer.mediaProcessor.sttVendors | join "," | quote }}
            - name: MEDIA_PROCESSOR_TTS_VENDORS
              value: {{ .Values.featureServer.mediaProcessor.ttsVendors | join "," | quote }}
            - name: MEDIA_PROCESSOR_CACHE_TYPE
              value: {{ .Values.mediaProcessor.cache.type | quote }}
            {{- end }}
            - name: VG_SPEECH_BILLING_ENABLED
              value: {{ .Values.billing.enabled | quote }}
            - name: VG_CLUSTER_ID
              value: {{ .Values.billing.clusterId | default .Values.ingress.webapp.host | quote }}
            {{- if .Values.billing.enabled }}
            - name: VG_SPEECH_BILLING_MYSQL_USER
              value: {{ .Values.billing.mysql.username | quote }}
            - name: VG_SPEECH_BILLING_MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.billing.mysql.existingSecret | quote }}
                  key: {{ .Values.billing.mysql.secretKey | quote }}
            {{- end }}
            - name: LOG_REDACTION_ENABLED
              value: {{ $.Values.logRedaction.enabled | default "false" | quote }}
            {{- if .Values.sileroVad.enabled }}
            - name: SILERO_VAD_SERVICE_URL
              value: "ws://silero-vad:{{ .Values.sileroVad.port }}/ws"
            - name: VG_SILERO_VAD_SHADOW_MODE_ENABLED
              value: {{ .Values.sileroVad.shadowModeEnabled | quote }}
            - name: VG_SILERO_VAD_SHADOW_SAMPLE_RATE
              value: {{ .Values.sileroVad.shadowSampleRate | quote }}
            ## Per-layer production VAD graduation kill-switches (default off;
            ## flip per-cluster + per-account to graduate a validated layer).
            {{- range $key := .Values.sileroVad.prodGraduationEnv | keys | sortAlpha }}
            {{- $val := index $.Values.sileroVad.prodGraduationEnv $key }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.featureServer.extraEnvVars }}
            {{- include "vg.common.tplvalues.render" (dict "value" .Values.featureServer.extraEnvVars "context" $) | nindent 12 }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: cognigy-env
      volumes:
        - name: temp-audio-volume
          emptyDir: {}
        - name: fs-core-dumps
          emptyDir:
            sizeLimit: "2Gi"