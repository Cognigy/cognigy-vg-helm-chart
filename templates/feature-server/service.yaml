apiVersion: v1
kind: Service
metadata:
  ## Always headless (clusterIP: None) so SIP/in-dialog routing resolves to real
  ## pod IPs in both StatefulSet and Deployment modes. A regular ClusterIP VIP
  ## breaks SIP (response source-IP mismatch, unreliable UDP conntrack).
  name: {{ .Values.featureServer.headlessServiceName | quote }}
  namespace: {{ $.Release.Namespace | quote }}
  labels:
    app: feature-server
    owner-team: echo
spec:
  selector:
    app: feature-server
  type: ClusterIP
  clusterIP: None
  ports:
    - name: sip
      port: {{ .Values.featureServer.ports.udp }}
      targetPort: {{ .Values.featureServer.ports.udp }}
      {{- if .Values.sbcInbound.featureServerSignalingTransportTcp }}
      protocol: TCP
      {{- else }}
      protocol: UDP
      {{- end }}
    - name: http
      port: {{ .Values.featureServer.ports.tcp }}
      targetPort: {{ .Values.featureServer.ports.tcp }}
      protocol: TCP
