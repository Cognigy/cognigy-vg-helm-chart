{{- if .Values.featureServerNightly.enabled }}
apiVersion: v1
kind: Service
metadata:
  ## Always headless (clusterIP: None) so SIP/in-dialog routing resolves to real
  ## pod IPs in both StatefulSet and Deployment modes.
  name: {{ .Values.featureServerNightly.headlessServiceName | quote }}
  namespace: {{ $.Release.Namespace | quote }}
  labels:
    app: feature-server-nightly
    owner-team: echo
spec:
  selector:
    app: feature-server-nightly
  type: ClusterIP
  clusterIP: None
  ports:
    - name: sip
      port: {{ .Values.featureServerNightly.ports.udp }}
      targetPort: {{ .Values.featureServerNightly.ports.udp }}
      {{- if .Values.sbcInbound.featureServerSignalingTransportTcp }}
      protocol: TCP
      {{- else }}
      protocol: UDP
      {{- end }}
    - name: http
      port: {{ .Values.featureServerNightly.ports.tcp }}
      targetPort: {{ .Values.featureServerNightly.ports.tcp }}
      protocol: TCP
{{- end }}