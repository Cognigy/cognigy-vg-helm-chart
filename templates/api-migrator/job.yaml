apiVersion: batch/v1
kind: Job
metadata:
  name: api-migrator-{{ .Release.Revision }}
  namespace: {{ $.Release.Namespace | quote }}
  labels:
    owner-team: echo
  annotations:
    {{- if .Values.apiMigrator.hookEnabled }}
    # This is what defines this resource as a hook. Without these lines, the
    # resource is considered part of the release.
    "helm.sh/hook": {{ .Values.apiMigrator.hook | quote }}
    "helm.sh/hook-weight": "-1"
    "helm.sh/hook-delete-policy": {{ .Values.apiMigrator.hookDeletePolicy | quote }}
    {{- end }}
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      name: api-migrator
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
    {{- include "image.pullSecrets" $ | nindent 6 }}
      restartPolicy: OnFailure
      initContainers:
        # Create billing database, dedicated billing user, and grant privileges using root credentials
        # Tables are created by setup-billing-schema.js in the main container
        - name: create-billing-db
          image: "{{ include "vg.common.image.render" (dict "global" $.Values.global "image" (printf "%s/%s:%s" .Values.mysql.image.registry .Values.mysql.image.repository .Values.mysql.image.tag)) }}"
          imagePullPolicy: {{ .Values.apiMigrator.imagePullPolicy | default "IfNotPresent" }}
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              
              echo "Creating vg_speech_billing database..."
              MYSQL_PWD="$MYSQL_ROOT_PASSWORD" mysql -h "$MYSQL_HOST" -u root -e "
                CREATE DATABASE IF NOT EXISTS vg_speech_billing
                  CHARACTER SET utf8mb4
                  COLLATE utf8mb4_unicode_ci;
              "
              
              echo "Creating dedicated billing user..."
              MYSQL_PWD="$MYSQL_ROOT_PASSWORD" mysql -h "$MYSQL_HOST" -u root -e "
                CREATE USER IF NOT EXISTS '$BILLING_USER'@'%' IDENTIFIED BY '$BILLING_PASSWORD';
                GRANT ALL PRIVILEGES ON vg_speech_billing.* TO '$BILLING_USER'@'%';
                FLUSH PRIVILEGES;
              "
              
              echo "Verifying database exists..."
              MYSQL_PWD="$MYSQL_ROOT_PASSWORD" mysql -h "$MYSQL_HOST" -u root -e "USE vg_speech_billing" || {
                echo "CRITICAL: Failed to verify vg_speech_billing database"
                exit 1
              }
              
              echo "Billing database and user ready."
          env:
            - name: MYSQL_HOST
              value: {{ .Values.mysql.host | quote }}
            - name: BILLING_USER
              value: {{ .Values.billing.mysql.username | quote }}
            - name: BILLING_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.billing.mysql.existingSecret | quote }}
                  key: {{ .Values.billing.mysql.secretKey | quote }}
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: voicegateway-mysql-password
                  key: mysql-root-password     
      containers:
        - name: api-migrator-init
          image: {{ include "vg.common.image.render" (dict "global" $.Values.global "image" .Values.apiMigrator.image) }}
          imagePullPolicy: {{ .Values.apiMigrator.imagePullPolicy }}
          {{- if .Values.billing.enabled }}
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "=== Running vg migrations ==="
              node /opt/app/migrator/migrate.js release
              
              echo ""
              echo "=== Setting up billing schema ==="
              node /opt/app/migrator/setup-billing-schema.js
              
              echo ""
              echo "=== All migrations complete ==="
          {{- end }}
          env:
            - name: JAMBONES_MYSQL_HOST
              value: {{ .Values.mysql.host | quote }}
            - name: JAMBONES_MYSQL_DATABASE
              value: {{ .Values.mysql.database.name | quote }}
            - name: JAMBONES_MYSQL_USER
              value: {{ .Values.mysql.auth.username | quote }}
            - name: JAMBONES_MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: voicegateway-mysql-password
                  key: mysql-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: voicegateway-jwt
                  key: jwt
            - name: JAMBONES_TIME_SERIES_HOST
              value: {{ .Values.influxdb.host }}
            - name: API_MIGRATION_TARGET
              value: {{ .Values.apiMigrator.migrationTarget }}
            {{- if .Values.billing.enabled }}
            - name: VG_SPEECH_BILLING_MYSQL_HOST
              value: {{ .Values.mysql.host | quote }}
            - name: VG_SPEECH_BILLING_MYSQL_USER
              value: {{ .Values.billing.mysql.username | quote }}
            - name: VG_SPEECH_BILLING_MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.billing.mysql.existingSecret | quote }}
                  key: {{ .Values.billing.mysql.secretKey | quote }}
            {{- end }}
            - name: JAMBONES_DISABLE_TTS_STREAMING
              {{- if kindIs "bool" .Values.featureServer.enableTtsStreaming }}
              value: {{ not .Values.featureServer.enableTtsStreaming | quote }}
              {{- else }}
              value: {{ not .Values.global.enableTtsStreaming | quote }}
              {{- end }}
            {{- if .Values.apiMigrator.extraEnvVars }}
            {{- include "vg.common.tplvalues.render" (dict "value" .Values.apiMigrator.extraEnvVars "context" $) | nindent 12 }}
            {{- end }}
        {{- if .Values.apiMigrator.logCollectorEnabled }}
        - name: log-collector
          image: fluentd
          imagePullPolicy: {{ .Values.apiMigrator.imagePullPolicy }}
        {{- end }}