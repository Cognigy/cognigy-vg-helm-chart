{{- $hypercareTargetUrl := coalesce .Values.vgPagerdutyAgent.hypercare.centralConsoleUrl .Values.vgPagerdutyAgent.hypercare.centralAgentUrl -}}
{{- if and .Values.vgPagerdutyAgent.hypercare.activateOnDeploy $hypercareTargetUrl .Values.vgPagerdutyAgent.hypercare.localEnvironment }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: vg-pagerduty-agent-hypercare-activate-remote
  namespace: {{ $.Release.Namespace | quote }}
  annotations:
    "helm.sh/hook": post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
  labels:
    app: vg-pagerduty-agent-hypercare-activate-remote
    owner-team: echo
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: vg-pagerduty-agent-hypercare-activate-remote
    spec:
      {{- include "image.pullSecrets" $ | nindent 6 }}
      {{- if .Values.vgPagerdutyAgent.nodeSelector }}
      nodeSelector: {{- include "vg.common.tplvalues.render" (dict "value" .Values.vgPagerdutyAgent.nodeSelector "context" $) | nindent 8 }}
      {{- end }}
      {{- if .Values.vgPagerdutyAgent.tolerations }}
      tolerations: {{- include "vg.common.tplvalues.render" (dict "value" .Values.vgPagerdutyAgent.tolerations "context" $) | nindent 8 }}
      {{- end }}
      restartPolicy: Never
      containers:
        - name: vg-pagerduty-agent-hypercare-activate-remote
          image: {{ include "vg.common.image.render" (dict "global" $.Values.global "image" .Values.jobs.image) }}
          imagePullPolicy: IfNotPresent
          env:
            - name: HYPERCARE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.vgPagerdutyAgent.secretName | default "vg-pagerduty-agent-secrets" }}
                  key: HYPERCARE_API_TOKEN
                  optional: true
            - name: HYPERCARE_PAYLOAD
              value: {{ dict "environment" .Values.vgPagerdutyAgent.hypercare.localEnvironment "window_hours" (.Values.vgPagerdutyAgent.hypercare.windowHours | default 2) "release_version" (regexFind "^[0-9]+\\.[0-9]+\\.[0-9]+" .Chart.Version) | toJson | quote }}
            - name: HYPERCARE_TARGET_URL
              value: {{ $hypercareTargetUrl | quote }}
            - name: HYPERCARE_TARGET_KIND
              value: {{ ternary "vg-console" "vg-pagerduty-agent" (ne .Values.vgPagerdutyAgent.hypercare.centralConsoleUrl "") | quote }}
          command:
            - /bin/sh
            - -c
            - |
              # Hypercare window state is owned by vg-console. Both vg-console and the
              # vg-pagerduty-agent accept POST /api/hypercare/activate (the agent forwards
              # to vg-console), so this Job uses the same path regardless of target.
              #
              # This Job is intentionally fail-soft: any failure to activate the hypercare
              # window logs a warning and exits 0 so the helm upgrade itself does not fail.
              # A failed activation means monitoring is not enabled for this release; it
              # does not mean the release itself is broken. SRE should monitor via the
              # post-deployment check (PDC) and alerts on hypercare window coverage.

              if [ -z "${HYPERCARE_API_TOKEN}" ]; then
                echo "WARNING: HYPERCARE_API_TOKEN is empty -- skipping hypercare activation"
                exit 0
              fi

              echo "Activating hypercare on ${HYPERCARE_TARGET_KIND} (${HYPERCARE_TARGET_URL}) for environment: {{ .Values.vgPagerdutyAgent.hypercare.localEnvironment }}"
              echo "Payload: ${HYPERCARE_PAYLOAD}"

              response=$(curl -s -w "\nHTTP_STATUS:%{http_code}" --max-time 30 -X POST \
                -H "Content-Type: application/json" \
                -H "Authorization: Bearer ${HYPERCARE_API_TOKEN}" \
                -d "${HYPERCARE_PAYLOAD}" \
                "${HYPERCARE_TARGET_URL}/api/hypercare/activate") || true

              http_code=$(echo "$response" | grep "HTTP_STATUS:" | cut -d: -f2)
              body=$(echo "$response" | sed '/HTTP_STATUS:/d')

              echo "HTTP Status: ${http_code:-no-response}"
              echo "Response: ${body}"

              if [ "$http_code" = "200" ] || [ "$http_code" = "201" ] || [ "$http_code" = "204" ]; then
                echo "Hypercare window activated successfully on ${HYPERCARE_TARGET_KIND}"
                exit 0
              fi

              echo "WARNING: Failed to activate hypercare window on ${HYPERCARE_TARGET_KIND} (HTTP ${http_code:-no-response})."
              echo "WARNING: Release will continue; SRE should verify hypercare coverage manually."
              exit 0
{{- end }}
