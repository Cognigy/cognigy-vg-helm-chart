{{- if .Values.vgPagerdutyAgent.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vg-pagerduty-agent
  namespace: {{ $.Release.Namespace | quote }}
  labels:
    app: vg-pagerduty-agent
    owner-team: echo
spec:
  selector:
    matchLabels:
      app: vg-pagerduty-agent
  replicas: {{ .Values.vgPagerdutyAgent.replicaCount | default 1 }}
  template:
    metadata:
      labels:
        app: vg-pagerduty-agent
    spec:
      {{- include "image.pullSecrets" $ | nindent 6 }}
      {{- if .Values.vgPagerdutyAgent.affinity }}
      affinity: {{- include "vg.common.tplvalues.render" (dict "value" .Values.vgPagerdutyAgent.affinity "context" $) | nindent 8 }}
      {{- end }}
      {{- if .Values.vgPagerdutyAgent.nodeSelector }}
      nodeSelector: {{- include "vg.common.tplvalues.render" (dict "value" .Values.vgPagerdutyAgent.nodeSelector "context" $) | nindent 8 }}
      {{- end }}
      {{- if .Values.vgPagerdutyAgent.tolerations }}
      tolerations: {{- include "vg.common.tplvalues.render" (dict "value" .Values.vgPagerdutyAgent.tolerations "context" $) | nindent 8 }}
      {{- end }}
      restartPolicy: Always
      containers:
        - name: vg-pagerduty-agent
          image: {{ include "vg.common.image.render" (dict "global" $.Values.global "image" .Values.vgPagerdutyAgent.image) }}
          imagePullPolicy: {{ .Values.vgPagerdutyAgent.imagePullPolicy | default "IfNotPresent" }}
          resources: {{- toYaml .Values.vgPagerdutyAgent.resources | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.vgPagerdutyAgent.port | default 3000 }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.vgPagerdutyAgent.port | default 3000 }}
            failureThreshold: 3
            initialDelaySeconds: 10
            periodSeconds: 60
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.vgPagerdutyAgent.port | default 3000 }}
            initialDelaySeconds: 5
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /health
              port: {{ .Values.vgPagerdutyAgent.port | default 3000 }}
            failureThreshold: 30
            periodSeconds: 10
          env:
            - name: NODE_ENV
              value: {{ .Values.global.nodeEnv | quote }}
            - name: PORT
              value: {{ .Values.vgPagerdutyAgent.port | default 3000 | quote }}
            - name: VG_CONSOLE_API_INTERNAL
              value: {{ printf "http://%s:%v" .Values.vgPagerdutyAgent.consoleServiceName (.Values.vgConsole.port | default 4000) | quote }}
            - name: ADO_FLUX_FLEET_USERNAME
              valueFrom:
                secretKeyRef:
                  name: flux-system
                  key: username
            - name: ADO_FLUX_FLEET_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flux-system
                  key: password
            {{- if and .Values.ingress.enabled .Values.ingress.vgConsole.host }}
            - name: VG_CONSOLE_API_PUBLIC
              value: {{ printf "%s://%s" .Values.api.protocol .Values.ingress.vgConsole.host | quote }}
            {{- end }}
            {{- if .Values.vgPagerdutyAgent.hypercare.enabled }}
            - name: HYPERCARE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.vgPagerdutyAgent.secretName | default "vg-pagerduty-agent-secrets" }}
                  key: HYPERCARE_API_TOKEN
            {{- end }}
            {{- if .Values.vgPagerdutyAgent.extraEnvVars }}
            {{- include "vg.common.tplvalues.render" (dict "value" .Values.vgPagerdutyAgent.extraEnvVars "context" $) | nindent 12 }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ .Values.vgPagerdutyAgent.secretName | default "vg-pagerduty-agent-secrets" }}
{{- end }}
