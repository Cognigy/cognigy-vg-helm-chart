{{- if and .Values.vgPagerdutyAgent.enabled .Values.vgPagerdutyAgent.hypercare.enabled }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: vg-pagerduty-agent-hypercare
  namespace: {{ $.Release.Namespace | quote }}
  labels:
    app: vg-pagerduty-agent-hypercare
    owner-team: echo
spec:
  schedule: {{ .Values.vgPagerdutyAgent.hypercare.schedule | quote }}
  startingDeadlineSeconds: 300
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: {{ .Values.vgPagerdutyAgent.hypercare.successfulJobsHistoryLimit | default 6 }}
  failedJobsHistoryLimit: {{ .Values.vgPagerdutyAgent.hypercare.failedJobsHistoryLimit | default 3 }}
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 300
      ttlSecondsAfterFinished: 600
      template:
        metadata:
          labels:
            app: vg-pagerduty-agent-hypercare
        spec:
          {{- include "image.pullSecrets" $ | nindent 10 }}
          {{- if .Values.vgPagerdutyAgent.nodeSelector }}
          nodeSelector: {{- include "vg.common.tplvalues.render" (dict "value" .Values.vgPagerdutyAgent.nodeSelector "context" $) | nindent 12 }}
          {{- end }}
          {{- if .Values.vgPagerdutyAgent.tolerations }}
          tolerations: {{- include "vg.common.tplvalues.render" (dict "value" .Values.vgPagerdutyAgent.tolerations "context" $) | nindent 12 }}
          {{- end }}
          restartPolicy: Never
          containers:
            - name: hypercare-trigger
              image: {{ include "vg.common.image.render" (dict "global" $.Values.global "image" .Values.jobs.image) }}
              imagePullPolicy: IfNotPresent
              env:
                - name: HYPERCARE_API_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.vgPagerdutyAgent.secretName | default "vg-pagerduty-agent-secrets" }}
                      key: HYPERCARE_API_TOKEN
              command:
                - /bin/sh
                - -c
                - |
                  response=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
                    -H "Content-Type: application/json" \
                    -H "Authorization: Bearer ${HYPERCARE_API_TOKEN}" \
                    http://vg-pagerduty-agent:{{ .Values.vgPagerdutyAgent.port | default 3000 }}/api/hypercare/run)

                  http_code=$(echo "$response" | grep "HTTP_STATUS:" | cut -d: -f2)
                  body=$(echo "$response" | sed '/HTTP_STATUS:/d')

                  if [ "$http_code" = "204" ]; then
                    echo "No active hypercare window -- nothing to do"
                    exit 0
                  elif [ "$http_code" = "200" ] || [ "$http_code" = "202" ]; then
                    echo "Hypercare run completed: $body"
                    exit 0
                  else
                    echo "Hypercare run failed (HTTP $http_code): $body"
                    exit 1
                  fi
{{- end }}
